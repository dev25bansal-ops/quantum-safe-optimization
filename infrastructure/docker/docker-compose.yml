# Docker Compose for Quantum-Safe Optimization Platform
# Local development and testing configuration

version: '3.9'

services:
  # Main API service
  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
      target: development
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - COSMOS_ENDPOINT=https://localhost:8081
      - COSMOS_KEY=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==
      - COSMOS_DATABASE=quantum_optimization
      - USE_MANAGED_IDENTITY=false
      - JWT_SECRET=dev-secret-change-in-production
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=DEBUG
    volumes:
      - ../../api:/app/api
      - ../../optimization:/app/optimization
    depends_on:
      - redis
      - cosmos-emulator
    networks:
      - quantum-net

  # Celery worker for async job processing
  worker:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
      target: development
    command: celery -A api.tasks worker --loglevel=info
    environment:
      - APP_ENV=development
      - COSMOS_ENDPOINT=https://cosmos-emulator:8081
      - COSMOS_KEY=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ../../api:/app/api
      - ../../optimization:/app/optimization
    depends_on:
      - redis
      - cosmos-emulator
    networks:
      - quantum-net

  # Redis for Celery task queue
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - quantum-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Azure Cosmos DB Emulator for local development
  cosmos-emulator:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    ports:
      - "8081:8081"
      - "10251:10251"
      - "10252:10252"
      - "10253:10253"
      - "10254:10254"
    environment:
      - AZURE_COSMOS_EMULATOR_PARTITION_COUNT=10
      - AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE=true
    volumes:
      - cosmos-data:/data
    networks:
      - quantum-net
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:8081/_explorer/emulator.pem"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Nginx reverse proxy (optional, for production-like setup)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - quantum-net
    profiles:
      - production

volumes:
  redis-data:
  cosmos-data:

networks:
  quantum-net:
    driver: bridge
