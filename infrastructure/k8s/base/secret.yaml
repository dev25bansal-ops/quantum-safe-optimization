# Secret management for Quantum-Safe Optimization Platform
# Uses External Secrets Operator with Azure Key Vault
#
# SECURITY: No hardcoded secrets in this file!
# All secrets are fetched from Azure Key Vault via ExternalSecret
#
# For local development:
#   1. Copy secret.example.yaml to secret.local.yaml
#   2. Fill in your development values
#   3. Apply secret.local.yaml separately (DO NOT COMMIT)
#
# For production:
#   1. Deploy External Secrets Operator
#   2. Configure Azure Key Vault with required secrets
#   3. Apply this file - secrets will be synced from Key Vault

apiVersion: v1
kind: Secret
metadata:
  name: quantum-api-secrets-placeholder
  namespace: quantum-platform
  labels:
    app: quantum-api
    component: secrets
  annotations:
    # This is a placeholder - ExternalSecret will create the actual secret
    kubernetes.io/description: "Placeholder - actual secrets managed by ExternalSecret"
    secret.kubernetes.io/managed: "true"
type: Opaque
data:
  # Empty placeholder - required for kustomize build
  # DO NOT ADD HARDCODED VALUES HERE
  placeholder: ""

---
# Azure Key Vault ClusterSecretStore
# Requires: external-secrets operator and Azure Workload Identity
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: azure-key-vault
spec:
  provider:
    azurekv:
      vaultUrl: "${AZURE_KEY_VAULT_URL}"
      authType: WorkloadIdentity
      serviceAccountRef:
        name: quantum-api
        namespace: quantum-platform

---
# ExternalSecret for production secrets from Azure Key Vault
# This replaces all hardcoded secrets with secure Key Vault references
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: quantum-api-external-secrets
  namespace: quantum-platform
  labels:
    app: quantum-api
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-key-vault
    kind: ClusterSecretStore
  target:
    name: quantum-api-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app: quantum-api
        annotations:
          reloader.stakater.com/match: "true"
  data:
    # Authentication Secrets
    - secretKey: JWT_SECRET
      remoteRef:
        key: jwt-secret
    - secretKey: JWT_REFRESH_SECRET
      remoteRef:
        key: jwt-refresh-secret

    # Database Credentials
    - secretKey: COSMOS_KEY
      remoteRef:
        key: cosmos-primary-key
    - secretKey: COSMOS_CONNECTION_STRING
      remoteRef:
        key: cosmos-connection-string

    # Cache/Queue
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: redis-password

    # Quantum Backend Tokens
    - secretKey: IBM_QUANTUM_TOKEN
      remoteRef:
        key: ibm-quantum-token
    - secretKey: DWAVE_API_TOKEN
      remoteRef:
        key: dwave-api-token
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: aws-access-key
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: aws-secret-key
    - secretKey: AZURE_QUANTUM_KEY
      remoteRef:
        key: azure-quantum-key

    # Post-Quantum Cryptography Keys
    - secretKey: PQC_SIGNING_KEY
      remoteRef:
        key: pqc-signing-key
    - secretKey: PQC_ENCRYPTION_KEY
      remoteRef:
        key: pqc-encryption-key

    # Encryption at Rest
    - secretKey: ENCRYPTION_MASTER_KEY
      remoteRef:
        key: encryption-master-key

    # OAuth
    - secretKey: OAUTH_CLIENT_SECRET
      remoteRef:
        key: oauth-client-secret

    # Webhooks
    - secretKey: WEBHOOK_SECRET
      remoteRef:
        key: webhook-secret

---
# Required secrets in Azure Key Vault (for reference)
# Create these secrets in your Key Vault before deployment:
#
# jwt-secret - JWT signing secret (min 32 chars)
# jwt-refresh-secret - Refresh token secret (min 32 chars)
# cosmos-primary-key - Azure Cosmos DB key
# cosmos-connection-string - Cosmos DB connection string
# redis-password - Redis authentication password
# ibm-quantum-token - IBM Quantum API token
# dwave-api-token - D-Wave Leap API token
# aws-access-key - AWS access key ID
# aws-secret-key - AWS secret access key
# azure-quantum-key - Azure Quantum workspace key
# pqc-signing-key - ML-DSA signing key (base64)
# pqc-encryption-key - ML-KEM encryption key (base64)
# encryption-master-key - AES-256 master key (base64, 32 bytes)
# oauth-client-secret - OAuth provider client secret
# webhook-secret - Webhook signing secret
---
# Secret Rotation Configuration
# These annotations configure automatic secret rotation
apiVersion: v1
kind: ConfigMap
metadata:
  name: secret-rotation-config
  namespace: quantum-platform
data:
  # Rotation intervals (days)
  JWT_ROTATION_DAYS: "30"
  API_KEY_ROTATION_DAYS: "90"
  DATABASE_ROTATION_DAYS: "90"
  ENCRYPTION_KEY_ROTATION_DAYS: "365"
  PQC_KEY_ROTATION_DAYS: "365"

  # Grace periods (hours)
  GRACE_PERIOD_HOURS: "24"

  # Notification settings
  NOTIFY_BEFORE_DAYS: "7"
