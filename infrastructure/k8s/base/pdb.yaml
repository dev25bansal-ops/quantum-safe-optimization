# Pod Disruption Budget for Quantum API
# Ensures high availability during voluntary disruptions (node drains, upgrades)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: quantum-api
  namespace: quantum-platform
  labels:
    app: quantum-api
    component: api
spec:
  # At least 2 pods must be available at all times
  minAvailable: 2
  selector:
    matchLabels:
      app: quantum-api
      component: api
---
