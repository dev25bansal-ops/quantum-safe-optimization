# Quantum-Safe Optimization Platform - Kubernetes Base Manifests
# This file uses Kustomize for environment-specific overlays

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: quantum-platform-base

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - pdb.yaml
  - networkpolicy.yaml

commonLabels:
  app.kubernetes.io/name: quantum-api
  app.kubernetes.io/part-of: quantum-platform
  app.kubernetes.io/managed-by: kustomize

images:
  - name: quantum-api
    newName: ghcr.io/quantum-platform/quantum-api
    newTag: latest
