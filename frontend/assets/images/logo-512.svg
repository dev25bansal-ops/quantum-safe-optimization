<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="quantumGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0a0a0f" rx="32"/>

  <!-- Quantum orbit -->
  <ellipse cx="256" cy="256" rx="180" ry="80" 
           fill="none" stroke="url(#quantumGradient)" stroke-width="4"
           transform="rotate(-30, 256, 256)" filter="url(#glow)"/>
  <ellipse cx="256" cy="256" rx="180" ry="80" 
           fill="none" stroke="url(#quantumGradient)" stroke-width="4"
           transform="rotate(30, 256, 256)" filter="url(#glow)"/>
  <ellipse cx="256" cy="256" rx="180" ry="80" 
           fill="none" stroke="url(#quantumGradient)" stroke-width="4"
           transform="rotate(90, 256, 256)" filter="url(#glow)"/>

  <!-- Central nucleus -->
  <circle cx="256" cy="256" r="60" fill="url(#quantumGradient)" filter="url(#glow)"/>

  <!-- Electron particles -->
  <circle cx="350" cy="200" r="15" fill="#a78bfa" filter="url(#glow)"/>
  <circle cx="162" cy="312" r="15" fill="#a78bfa" filter="url(#glow)"/>
  <circle cx="256" cy="376" r="15" fill="#a78bfa" filter="url(#glow)"/>

  <!-- Atom symbol -->
  <text x="256" y="270" text-anchor="middle" font-family="Arial, sans-serif" 
        font-size="64" font-weight="bold" fill="#0a0a0f">⚛</text>
</svg>
