# Promtail Configuration for Log Shipping
# https://grafana.com/docs/loki/latest/send-data/promtail/configuration/

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: qsop

scrape_configs:
  # Application logs
  - job_name: qsop-app
    static_configs:
      - targets:
          - localhost
        labels:
          job: qsop
          app: qsop-api
          __path__: /app/logs/*.log
    pipeline_stages:
      - match:
          selector: '{job="qsop"}'
          stages:
            - regex:
                expression: '^(?P<time>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3}) \[(?P<level>\w+)\] (?P<message>.*)$'
            - labels:
                level:
            - timestamp:
                source: time
                format: "2006-01-02 15:04:05.000"

  # System logs
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          __path__: /var/log/*.log

  # Docker container logs (if using Docker)
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
