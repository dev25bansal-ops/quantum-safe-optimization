# Redis Sentinel Configuration
# Monitor the master named "mymaster"
sentinel monitor mymaster redis-master 6379 2

# Number of milliseconds the master should be unreachable for to consider it down
sentinel down-after-milliseconds mymaster 5000

# How long to wait before starting a failover
sentinel failover-timeout mymaster 60000

# How many replicas can be reconfigured at the same time
sentinel parallel-syncs mymaster 1

# Password for authentication (set via environment variable in production)
# sentinel auth-pass mymaster YOUR_PASSWORD

# Announce IP and port for sentinel
# sentinel announce-ip <ip>
# sentinel announce-port <port>

# Log level
loglevel notice

# Log file (container stdout)
logfile ""

# Do not daemonize (run in foreground for Docker)
daemonize no

# PID file
pidfile /var/run/redis/redis-sentinel.pid

# Bind to all interfaces
bind 0.0.0.0

# Port
port 26379

# Connection timeout
timeout 0

# TCP keepalive
tcp-keepalive 300
