# AlertManager Configuration
# https://prometheus.io/docs/alerting/latest/configuration/

global:
  resolve_timeout: 5m
  # SMTP configuration (enable for email alerts)
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_from: 'alerts@qsop.example.com'
  # smtp_auth_username: 'alerts@qsop.example.com'
  # smtp_auth_password: 'SMTP_PASSWORD'
  # smtp_require_tls: true

  # Slack configuration (enable for Slack alerts)
  # slack_api_url: 'https://hooks.slack.com/services/xxx'

# Inhibition rules - prevent certain alerts when others are firing
inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ["alertname", "instance"]

# Route tree
route:
  group_by: ["alertname", "severity", "instance"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default-receiver"
  routes:
    - matchers:
        - severity="critical"
      receiver: "critical-alerts"
      continue: true
    - matchers:
        - severity="warning"
      receiver: "warning-alerts"

# Receivers
receivers:
  - name: "default-receiver"
    webhook_configs:
      - url: "http://qsop:8000/api/v1/alerts/webhook"
        send_resolved: true

  - name: "critical-alerts"
    webhook_configs:
      - url: "http://qsop:8000/api/v1/alerts/webhook"
        send_resolved: true
    # Email config (uncomment to enable)
    # email_configs:
    #   - to: 'ops-team@example.com'
    #     send_resolved: true
    # Slack config (uncomment to enable)
    # slack_configs:
    #   - channel: '#critical-alerts'
    #     send_resolved: true

  - name: "warning-alerts"
    webhook_configs:
      - url: "http://qsop:8000/api/v1/alerts/webhook"
        send_resolved: true

# Templates
templates:
  - "/etc/alertmanager/templates/*.tmpl"
