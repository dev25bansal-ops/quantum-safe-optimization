# Quantum-Safe Optimization Platform - CI/CD Pipeline
# Runs tests, builds Docker images, and deploys to Kubernetes

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: '3.11'
  RUST_VERSION: '1.75'

jobs:
  # ============================================
  # Lint and Type Check
  # ============================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install black ruff mypy
          pip install -r api/requirements.txt
      
      - name: Run Black (formatting check)
        run: black --check api/ tests/
      
      - name: Run Ruff (linting)
        run: ruff check api/ tests/
      
      - name: Run MyPy (type checking)
        run: mypy api/ --ignore-missing-imports || true

  # ============================================
  # Build Rust Crypto Module
  # ============================================
  build-rust:
    name: Build Rust Crypto
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      
      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crypto/target
          key: rust-${{ runner.os }}-${{ hashFiles('crypto/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-
      
      - name: Build Rust library
        working-directory: crypto
        run: cargo build --release
      
      - name: Run Rust tests
        working-directory: crypto
        run: cargo test --release
      
      - name: Build Python wheel
        working-directory: crypto
        run: |
          pip install maturin
          maturin build --release --out ../dist/
      
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-wheel
          path: dist/*.whl

  # ============================================
  # Python Tests
  # ============================================
  test:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: build-rust
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Download Rust wheel
        uses: actions/download-artifact@v4
        with:
          name: rust-wheel
          path: dist/
      
      - name: Install dependencies
        run: |
          pip install dist/*.whl
          pip install -r api/requirements.txt
          pip install -e optimization/
      
      - name: Run tests with coverage
        env:
          TESTING: '1'
          REDIS_URL: redis://localhost:6379
        run: |
          pytest tests/ -v --cov=api --cov=optimization --cov-report=xml --cov-report=html
      
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
      
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  # ============================================
  # Security Scan
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit -r api/requirements.txt || true

  # ============================================
  # Build Docker Image
  # ============================================
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
      
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
      
      - name: Run Trivy container scan
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-container.sarif'
          severity: 'CRITICAL,HIGH'

  # ============================================
  # Deploy to Staging
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.quantum-api.example.com
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
      
      - name: Configure Kubernetes context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}
      
      - name: Deploy to Kubernetes
        run: |
          # Update image tag in kustomization
          cd infrastructure/k8s/overlays/staging
          kustomize edit set image quantum-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          
          # Apply manifests
          kubectl apply -k .
          
          # Wait for rollout
          kubectl rollout status deployment/quantum-api -n quantum-staging --timeout=300s
      
      - name: Run smoke tests
        run: |
          STAGING_URL="https://staging.quantum-api.example.com"
          
          # Health check
          curl -sf "$STAGING_URL/health" | jq .
          
          # API version check
          curl -sf "$STAGING_URL/" | jq .

  # ============================================
  # Deploy to Production
  # ============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-docker
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://api.quantum-platform.example.com
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
      
      - name: Configure Kubernetes context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
      
      - name: Deploy to Kubernetes
        run: |
          # Extract version from tag
          VERSION=${GITHUB_REF#refs/tags/}
          
          # Update image tag in kustomization
          cd infrastructure/k8s/overlays/production
          kustomize edit set image quantum-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$VERSION
          
          # Apply manifests with canary strategy
          kubectl apply -k .
          
          # Wait for rollout
          kubectl rollout status deployment/quantum-api -n quantum-prod --timeout=600s
      
      - name: Run production smoke tests
        run: |
          PROD_URL="https://api.quantum-platform.example.com"
          
          # Health check
          curl -sf "$PROD_URL/health" | jq .
          
          # Verify API version
          curl -sf "$PROD_URL/" | jq .
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
