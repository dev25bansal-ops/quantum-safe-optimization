# CI/CD Pipeline for Quantum-Safe Optimization Platform
name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      deploy_production:
        description: 'Deploy to production'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: '3.11'
  PIP_CACHE_DIR: ${{ github.workspace }}/.cache/pip
  PRE_COMMIT_CACHE: ${{ github.workspace }}/.cache/pre-commit

jobs:
  # -----------------
  # Quality Checks
  # -----------------
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff black mypy pre-commit
        
    - name: Cache pre-commit
      uses: actions/cache@v4
      with:
        path: ${{ env.PRE_COMMIT_CACHE }}
        key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
        
    - name: Run pre-commit hooks
      run: |
        pre-commit run --all-files --show-diff-on-failure
        
    - name: Run Ruff linting
      run: |
        ruff check src/ api/ tests/
        
    - name: Run Black formatting check
      run: |
        black --check src/ api/ tests/
        
    - name: Run MyPy type checking
      run: |
        mypy src/ api/ --strict --ignore-missing-imports

  # -----------------
  # Security Scanning
  # -----------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety pip-audit
        
    - name: Run Bandit security scan
      run: |
        bandit -r src/ api/ -f json -o bandit-report.json || true
        
    - name: Run Safety dependency check
      run: |
        safety check --json > safety-report.json || true
        
    - name: Run pip-audit
      run: |
        pip-audit --json > pip-audit-report.json || true
        
    - name: Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json
          pip-audit-report.json

  # -----------------
  # Unit Tests
  # -----------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, security]
    
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install pytest pytest-cov pytest-asyncio pytest-mock
        
    - name: Run tests with coverage
      run: |
        pytest tests/ \
          -v \
          --cov=src/ \
          --cov=api/ \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term-missing \
          --cov-fail-under=70
        
    - name: Upload coverage report
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-${{ matrix.python-version }}
        
    - name: Upload coverage HTML
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-html-${{ matrix.python-version }}
        path: htmlcov/

  # -----------------
  # Integration Tests
  # -----------------
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test]
    
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install pytest pytest-asyncio httpx
        
    - name: Run integration tests
      run: |
        pytest tests/integration/ -v --asyncio-mode=auto

  # -----------------
  # Build
  # -----------------
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test, integration-test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine
        
    - name: Build package
      run: |
        python -m build
        
    - name: Check package with twine
      run: |
        twine check dist/*
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-package
        path: dist/

  # -----------------
  # Deploy to Staging
  # -----------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    
    environment:
      name: staging
      url: https://staging.quantum-optimization.example.com
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Deploy to staging
      run: |
        echo "Deploying to staging environment..."
        # Add deployment commands here
        # Example: kubectl apply -f k8s/staging/
        # Example: docker push registry/staging:latest

  # -----------------
  # Deploy to Production
  # -----------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    environment:
      name: production
      url: https://quantum-optimization.example.com
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Deploy to production
      run: |
        echo "Deploying to production environment..."
        # Add deployment commands here
        # Example: kubectl apply -f k8s/production/
        # Example: docker push registry/production:latest
        
    - name: Run smoke tests
      run: |
        echo "Running smoke tests..."
        # Add smoke test commands here
        
    - name: Notify on success
      if: success()
      run: |
        echo "Deployment successful!"
        # Add notification (Slack, Teams, etc.)
        
    - name: Notify on failure
      if: failure()
      run: |
        echo "Deployment failed!"
        # Add failure notification